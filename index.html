<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sample 1 - Modern Sidebar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { display: flex; height: 100vh; background: #fafafa; color: #111; }
    .sidebar { width: 240px; border-right: 1px solid #eaeaea; padding: 30px 20px; background: #fff; }
    .sidebar h2 { font-size: 16px; margin-bottom: 30px; letter-spacing: -0.5px; }
    .nav-item { padding: 10px 0; color: #666; font-size: 14px; cursor: pointer; }
    .nav-item.active { color: #000; font-weight: 600; }
    .main { flex: 1; padding: 30px 50px; display: flex; flex-direction: column; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eaeaea; padding-bottom: 20px; margin-bottom: 30px; }
    .title { font-size: 20px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
    th { text-align: left; padding: 12px; border-bottom: 2px solid #111; font-size: 12px; text-transform: uppercase; color: #666; }
    td { padding: 15px 12px; border-bottom: 1px solid #eaeaea; font-size: 14px; }
    .btn { background: #111; color: #fff; padding: 8px 16px; border: none; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Firms Name</h2>
    <div class="nav-item active">Dashboard</div>
    <div class="nav-item">Inventory</div>
    <div class="nav-item">Sales</div>
  </div>
  <div class="main">
    <div class="header">
      <div class="title">Stock Overview</div>
      <button class="btn">+ New Sale</button>
    </div>
    <table>
      <tr><th>Item Description</th><th>Available Stock</th><th>Rate</th><th>Action</th></tr>
      <tr><td>Avadh Ethnic Kurtis (Lot A)</td><td>120 pcs</td><td>₹450</td><td>Sell</td></tr>
      <tr><td>Surat Georgette Saree</td><td>500 m</td><td>₹110</td><td>Sell</td></tr>
    </table>
  </div>
</body>
</html>
