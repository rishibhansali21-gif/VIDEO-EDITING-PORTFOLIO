<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockSaathi — Minimal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================
       ULTRA MINIMAL THEME
       ========================================== */
    :root {
      --bg-color: #f9fafb;
      --surface: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --primary: #000000;
      --primary-hover: #374151;
      --danger: #ef4444;
      --success: #10b981;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }
    .brand {
      padding: 0 20px 20px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 15px;
    }
    .nav-link {
      padding: 12px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
      cursor: pointer;
    }
    .nav-link:hover, .nav-link.active {
      background: var(--bg-color);
      color: var(--primary);
      border-right: 3px solid var(--primary);
    }

    /* --- MAIN LAYOUT --- */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* --- TOPBAR --- */
    .topbar {
      height: 65px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .firm-name {
      font-weight: 600;
      font-size: 15px;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    /* --- DASHBOARD VIEWS --- */
    .view { padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .page-title { font-size: 24px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.5px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: var(--radius);
    }
    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;}
    .stat-value { font-size: 28px; font-weight: 600; }

    /* Minimal Table */
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { background: #fafafa; color: var(--text-muted); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">📦 StockSaathi</div>
    <div class="nav-link active">🏠 Dashboard</div>
    <div class="nav-link">🧵 Inventory</div>
    <div class="nav-link">💰 Sales & Billing</div>
    <div class="nav-link">📒 Party Ledger</div>
    <div class="nav-link">⚙️ Settings</div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="firm-name">Firms Name</div>
      <div>
        <button class="btn-primary">+ Quick Sell</button>
      </div>
    </header>

    <div class="view" id="dashboard">
      <h1 class="page-title">Overview</h1>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Stock Value</div>
          <div class="stat-value">₹0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Today's Sales</div>
          <div class="stat-value">₹0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Low Stock Items</div>
          <div class="stat-value" style="color: var(--danger);">0</div>
        </div>
      </div>

      <h2 style="font-size: 16px; margin-bottom: 15px; font-weight: 500;">Recent Transactions</h2>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Invoice</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 30px;">
                No transactions yet. Start selling!
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

</body>
</html>
